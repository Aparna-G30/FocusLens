<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusLens</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <div class="container">

        <div class="hero">

            <div class="brand">

            <img src="../assets/icon32.png" class="logo" alt="FocusLens">

            <h1>FocusLens</h1>

            </div>

            <p class="subtitle">
                Stay focused while reading.
            </p>
        </div>

        <div class="divider"></div>

        <div class="toggle-row">

            <span>Reading Mode</span>

            <button id="toggleBtn"></button>

        </div>

        <div class="divider"></div>
        <div class="card">
        <div class="features">

    <div class="feature">

        <span class="feature-icon">📄</span>

        <div>
            <h3>Smart Detection</h3>
            <p>Automatically follows the paragraph you're reading.</p>
        </div>

    </div>

    <div class="feature">

        <span class="feature-icon">✨</span>

        <div>
            <h3>Smooth Motion</h3>
            <p>Natural highlight transitions that don't distract.</p>
        </div>

    </div>

    <div class="feature">

        <span class="feature-icon">🌙</span>

        <div>
            <h3>Dark Mode</h3>
            <p>Matches your browser theme automatically.</p>
        </div>

    </div>

</div>
        </div>
        <div class="divider"></div>

        <span class="version">
            Version 0.1
        </span>

    </div>

    <script src="popup.js"></script>

</body>
</html>
